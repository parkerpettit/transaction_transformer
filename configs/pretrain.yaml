# I/O
data_dir: data         # Root directory of raw or processed data

# ------------- training loop hyper-parameters --------------------------------
total_epochs: 50      # Number of training epochs
batch_size:   256     # Batch size for training
lr:           5.0e-05   # Initial learning rate
window:       10       # Sequence length (transactions per sample)
stride:       5      # Stride length between windows

# ------------- feature lists ------------------------------------------------
cat_features:
  - User
  - Card
  - Use Chip
  - Merchant Name
  - Merchant City
  - Merchant State
  - Zip
  - MCC
  - Errors?
  - Year
  - Month
  - Day
  - Hour
cont_features:
  - Amount  

# ------------- architecture: embedding layer --------------------------------
emb_dropout: 0.0     # Dropout after embedding layer

# -- Field-level transformer (intra-row) --------------------------------------
ft_d_model:        72        # Hidden dimension
ft_depth:          1         # Number of layers
ft_n_heads:        8         # Number of attention heads
ft_ffn_mult:       4         # Feedforward expansion factor
ft_dropout:        0.1      # Dropout within field-transformer
ft_layer_norm_eps: 1.0e-8    # Layer-norm epsilon
ft_norm_first:     False      # Whether to apply norm before attention

# -- Sequence-level transformer (inter-row) -----------------------------------
seq_d_model:        72      # Hidden dimension
seq_depth:          1        # Number of layers
seq_n_heads:        8        # Number of attention heads
seq_ffn_mult:       4       # Feedforward expansion factor
seq_dropout:        0.1     # Dropout within sequence-transformer
seq_layer_norm_eps: 1.0e-8   # Layer-norm epsilon
seq_norm_first:     False     # Whether to apply norm before attention

# -- Final classification layer ----------------------------------------------
clf_dropout: 0.1   # Dropout before final classification layer

# -- Training mode and MLM settings ------------------------------------------
mode: "ar"  # "ar" or "masked"/"mlm" or "eval"
mask_prob: 0.15  # Probability of masking tokens in MLM mode

# Label smoothing parameters
use_label_smoothing: false  # Set to true for advanced label smoothing (slower but better generalization)
label_smoothing_epsilon: 0.1
neighborhood_size: 5

# MLM-specific optimizations
mlm_batch_size: 16  # Smaller batch size for MLM due to memory requirements
mlm_reduced_vocab: true  # Only compute logits for masked positions (experimental)
use_sparse_mlm: true  # Use efficient sparse MLM computation (recommended)

# -- Path Configuration --------------------------------------------------
# Override default filenames for data and checkpoints (optional)
data_dir: "data"  # Base data directory (required - can be set via CLI)
checkpoint_filename: "pretrained_backbone.pt"  # Model checkpoint filename
pretrain_data_filename: "legitimate_transactions_processed.pt"  # Pretraining data file
finetune_data_filename: "all_transactions_processed.pt"  # Finetuning data file

# -- Performance optimizations -----------------------------------------------
use_mixed_precision: true    # Enable automatic mixed precision training
gradient_checkpointing: false # Enable gradient checkpointing to save memory
compile_model: false        # Enable torch.compile for faster training (requires PyTorch 2.0+)
